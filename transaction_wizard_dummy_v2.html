<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقييم العقار — المعالج</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0f172a;
    --ink-soft:#475569;
    --muted:#64748b;
    --faint:#94a3b8;
    --line:#e6ebf1;
    --line-strong:#d7dee6;
    --bg:#f4f6f8;
    --panel:#ffffff;
    --accent:#0e7490;
    --accent-deep:#0b5a70;
    --accent-tint:#eaf7fa;
    --accent-tint-strong:#d7f0f5;
    --done:#178a4c;
    --done-tint:#eafbf1;
    --font-display:'Fraunces', serif;
    --font-body:'Inter', sans-serif;
    --font-mono:'IBM Plex Mono', monospace;
    --shadow-sm:0 1px 2px rgba(15,23,42,.04);
    --shadow-md:0 10px 24px -10px rgba(15,23,42,.14), 0 2px 6px -2px rgba(15,23,42,.06);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    font-family:var(--font-body);
    color:var(--ink);
    padding:36px clamp(18px,3vw,40px);
  }
  .shell{ max-width:1180px; margin:0 auto; }

  /* header */
  .page-head{
    display:flex; align-items:flex-end; justify-content:space-between;
    margin-bottom:22px; gap:16px; flex-wrap:wrap;
  }
  .page-head h1{
    font-family:var(--font-display); font-weight:600; font-size:22px; margin:0 0 6px;
    color:var(--ink); letter-spacing:-.01em;
  }
  .page-head .sub{
    font-size:13px; color:var(--muted); display:flex; align-items:center; gap:8px;
  }
  .page-head .sub .ref{ font-family:var(--font-mono); color:var(--ink-soft); }
  .page-head .progress-pill{
    font-family:var(--font-mono); font-size:11.5px; color:var(--accent-deep);
    background:var(--accent-tint); border:1px solid var(--accent-tint-strong);
    padding:6px 12px; border-radius:20px; white-space:nowrap;
  }

  /* overall progress bar */
  .progress-track{
    height:4px; background:var(--line); border-radius:4px; margin-bottom:24px; overflow:hidden;
  }
  .progress-fill{
    height:100%; background:linear-gradient(90deg, var(--accent), var(--accent-deep));
    border-radius:4px; transition:width .35s cubic-bezier(.2,.8,.2,1);
  }

  #app{ display:flex; gap:20px; align-items:stretch; }

  /* rail */
  #rail{
    width:252px; flex-shrink:0; background:var(--panel);
    border:1px solid var(--line); border-radius:14px;
    padding:12px; box-shadow:var(--shadow-sm);
    display:flex; flex-direction:column; gap:1px;
    max-height:640px; overflow-y:auto;
  }
  #rail::-webkit-scrollbar{ width:6px; }
  #rail::-webkit-scrollbar-thumb{ background:var(--line-strong); border-radius:6px; }

  .rail-btn{
    width:100%; display:flex; align-items:center; gap:10px;
    padding:10px 10px; border:none; border-radius:9px;
    background:transparent; cursor:pointer; text-align:right;
    transition:background .15s ease;
    position:relative;
  }
  .rail-btn:hover{ background:#f8fafc; }
  .rail-btn.active{ background:var(--accent-tint); }
  .rail-btn.active::before{
    content:""; position:absolute; left:6px; top:50%; transform:translateY(-50%);
    width:4px; height:16px; border-radius:3px; background:var(--accent);
  }

  .rail-icon{
    width:26px; height:26px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:13px; transition:background .15s ease, color .15s ease;
  }
  .rail-icon.done{ background:var(--done-tint); color:var(--done); }
  .rail-icon.active{ background:var(--accent); color:#fff; box-shadow:0 0 0 3px var(--accent-tint-strong); }
  .rail-icon.todo{ background:#f1f5f9; color:var(--faint); }

  .rail-label{
    font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1;
    color:var(--ink); font-weight:500;
  }
  .rail-btn.active .rail-label{ color:var(--accent-deep); font-weight:600; }
  .rail-btn:not(.active) .rail-label{ font-weight:400; color:var(--ink-soft); }

  .rail-badge{
    font-family:var(--font-mono); font-size:10px; color:var(--faint); flex-shrink:0;
    background:#f1f5f9; padding:2px 6px; border-radius:10px;
  }
  .rail-check{ font-size:12px; }

  .rail-divider{ height:1px; background:var(--line); margin:6px 4px; }

  /* content column */
  #col{ flex:1; min-width:0; display:flex; flex-direction:column; }
  #content{
    background:var(--panel); border:1px solid var(--line); border-radius:14px;
    padding:26px 30px 28px; flex:1; display:flex; flex-direction:column;
    box-shadow:var(--shadow-sm);
    animation:fade .25s ease both;
  }
  @keyframes fade{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);} }

  .step-eyebrow{
    font-family:var(--font-mono); font-size:11px; letter-spacing:.06em; text-transform:uppercase;
    color:var(--accent); margin:0 0 4px; display:flex; align-items:center; gap:6px;
  }
  .icon{ width:14px; height:14px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; display:inline-block; vertical-align:middle; }
  .rail-icon .icon{ width:14px; height:14px; }
  .nav-btn .icon{ width:15px; height:15px; }
  .map-btn .icon{ width:15px; height:15px; }
  .hint .icon{ width:14px; height:14px; }
  .map-preview .icon{ width:22px; height:22px; }
  #content h3{
    font-family:var(--font-display); font-weight:600; font-size:20px; margin:0 0 18px; color:var(--ink);
    padding-bottom:14px; border-bottom:1px solid var(--line);
  }

  label{ font-size:12px; color:var(--muted); font-weight:500; display:block; margin-bottom:6px; }
  input, select, textarea{
    width:100%; padding:9px 12px; border:1px solid var(--line-strong); border-radius:9px;
    background:#fff; font-family:var(--font-body); font-size:13.5px; color:var(--ink);
    transition:border-color .15s ease, box-shadow .15s ease; outline:none;
  }
  input:focus, select:focus, textarea:focus{
    border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-tint-strong);
  }
  input::placeholder, textarea::placeholder{ color:var(--faint); }
  textarea{ resize:vertical; }

  .field-row{ display:grid; grid-template-columns:1fr 1fr; gap:16px 18px; }
  .field{ display:flex; flex-direction:column; }

  .hint{
    font-size:12px; color:var(--accent-deep); margin-top:12px; display:flex; align-items:center; gap:5px;
  }
  .compare-row{
    border:1px solid var(--line); border-radius:10px; padding:11px 14px; margin-bottom:8px;
    display:flex; justify-content:space-between; font-size:13px; background:#fbfcfd;
  }
  .compare-row .price{ color:var(--accent-deep); font-weight:600; font-family:var(--font-mono); font-size:12.5px; }

  .stat-box{
    background:#f8fafc; border:1px solid var(--line); border-radius:10px; padding:14px 16px;
  }
  .stat-box .stat-label{ font-size:11.5px; color:var(--muted); margin:0 0 4px; }
  .stat-box .stat-value{ font-family:var(--font-display); font-size:22px; font-weight:600; margin:0; color:var(--ink); }

  .method-tabs{ display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap; }
  .method-tab{
    border-radius:8px; font-size:12px; padding:7px 15px; cursor:pointer; font-weight:500;
    border:1px solid var(--line-strong); background:#fff; color:var(--ink-soft);
    transition:all .15s ease;
  }
  .method-tab.on{ background:var(--accent); color:#fff; border-color:var(--accent); }

  .map-btn{
    background:var(--accent-tint); color:var(--accent-deep); border:1px solid var(--accent-tint-strong);
    padding:9px 16px; border-radius:9px; font-size:13px; font-weight:500; cursor:pointer;
    display:inline-flex; align-items:center; gap:7px; margin-bottom:14px; transition:background .15s ease;
  }
  .map-btn:hover{ background:var(--accent-tint-strong); }
  .coord{ font-family:var(--font-mono); color:var(--muted); font-size:12.5px; margin:0 0 12px; }
  .map-preview{
    height:180px; background:
      repeating-linear-gradient(0deg, transparent, transparent 19px, #eef2f5 20px),
      repeating-linear-gradient(90deg, transparent, transparent 19px, #eef2f5 20px), #f8fafc;
    border-radius:10px; border:1px dashed var(--line-strong);
    display:flex; align-items:center; justify-content:center; color:var(--faint); font-size:13px; gap:6px;
  }

  .content-spacer{ flex:1; }

  /* footer nav */
  .nav-row{ display:flex; justify-content:space-between; align-items:center; margin-top:14px; }
  .nav-btn{
    display:inline-flex; align-items:center; gap:7px; font-size:13.5px; font-weight:600;
    padding:10px 18px; border-radius:9px; cursor:pointer; transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
    font-family:var(--font-body);
  }
  .nav-btn:active{ transform:scale(.97); }
  #prevBtn{ background:#fff; color:var(--ink); border:1px solid var(--line-strong); }
  #prevBtn:hover:not(:disabled){ background:#f8fafc; border-color:var(--faint); }
  #nextBtn{ background:var(--accent); color:#fff; border:none; box-shadow:var(--shadow-md); }
  #nextBtn:hover:not(:disabled){ background:var(--accent-deep); }
  .nav-btn:disabled{ opacity:.4; cursor:not-allowed; box-shadow:none; }
  .nav-mid{ font-family:var(--font-mono); font-size:12px; color:var(--faint); }

  @media (max-width:760px){
    #app{ flex-direction:column; }
    #rail{ width:100%; max-height:none; flex-direction:row; overflow-x:auto; }
    .rail-btn{ width:auto; flex-shrink:0; }
    .rail-label{ white-space:nowrap; }
    .field-row{ grid-template-columns:1fr; }
  }
</style>
</head>
<body>
<div class="shell">

  <div class="page-head">
    <div>
      <h1>تقييم العقار</h1>
      <div class="sub"><span class="ref">مرجع رقم 4821</span> · أحمد العتيبي · تمويل</div>
    </div>
    <div class="progress-pill" id="progress-pill">الخطوة 1 من 12</div>
  </div>

  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

  <div id="app">
    <div id="rail"></div>
    <div id="col">
      <div id="content"></div>
      <div class="nav-row">
        <button id="prevBtn" class="nav-btn"></button>
        <span class="nav-mid" id="nav-mid"></span>
        <button id="nextBtn" class="nav-btn"></button>
      </div>
    </div>
  </div>

</div>

<script>
// inline SVG icon set (lucide paths) — avoids relying on external icon-font loading
const ICONS = {
  clipboard: '<path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/>',
  mappin: '<path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/>',
  database: '<ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/>',
  compass: '<path d="m16.24 7.76-1.804 5.411a2 2 0 0 1-1.265 1.265L7.76 16.24l1.804-5.411a2 2 0 0 1 1.265-1.265z"/><circle cx="12" cy="12" r="10"/>',
  layers: '<path d="M12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83z"/><path d="M2 12a1 1 0 0 0 .58.91l8.6 3.91a2 2 0 0 0 1.65 0l8.58-3.9A1 1 0 0 0 22 12"/><path d="M2 17a1 1 0 0 0 .58.91l8.6 3.91a2 2 0 0 0 1.65 0l8.58-3.9A1 1 0 0 0 22 17"/>',
  map: '<path d="M14.106 5.553a2 2 0 0 0 1.788 0l3.659-1.83A1 1 0 0 1 21 4.619v12.764a1 1 0 0 1-.553.894l-4.553 2.277a2 2 0 0 1-1.788 0l-4.212-2.106a2 2 0 0 0-1.788 0l-3.659 1.83A1 1 0 0 1 3 19.381V6.618a1 1 0 0 1 .553-.894l4.553-2.277a2 2 0 0 1 1.788 0z"/><path d="M15 5.764v15"/><path d="M9 3.236v15"/>',
  mappinoff: '<path d="M12.75 7.09a3 3 0 0 1 2.16 2.16"/><path d="M17.072 17.072c-1.634 2.17-3.527 3.912-4.471 4.727a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a7.99 7.99 0 0 1 1.999-5.285"/><path d="M9.288 4.293A8 8 0 0 1 20 10c0 1.831-.647 3.575-1.618 5.113"/><path d="m2 2 20 20"/><path d="M8.35 8.35a3 3 0 0 0 4.3 4.3"/>',
  scale: '<path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"/>',
  tool: '<path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>',
  infocircle: '<circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>',
  chartbar: '<line x1="18" x2="18" y1="20" y2="10"/><line x1="12" x2="12" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="14"/>',
  reportmoney: '<rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/><path d="M12 15h.01"/>',
  usercheck: '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="m16 11 2 2 4-4"/>',
  scroll: '<path d="M15 12h-5"/><path d="M15 8h-5"/><path d="M19 17V5a2 2 0 0 0-2-2H4"/><path d="M8 21h12a2 2 0 0 0 2-2v-1a1 1 0 0 0-1-1H11a1 1 0 0 0-1 1v1a2 2 0 1 1-4 0V5a2 2 0 1 0-4 0v2a1 1 0 0 0 1 1h3"/>',
  check: '<path d="M20 6 9 17l-5-5"/>',
  arrowleft: '<path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>',
  arrowright: '<path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>',
};
function icon(name){ return `<svg class="icon" viewBox="0 0 24 24">${ICONS[name]||''}</svg>`; }

const steps = [
  {label:"نظرة عامة", icon:"clipboard", done:true, body:`
    <div class="field-row">
      <div class="field"><label>العنوان</label><input value="حي النخيل، الرياض"/></div>
      <div class="field"><label>نوع العقار</label><input value="فيلا سكنية"/></div>
    </div>`},
  {label:"الموقع والتصنيف", icon:"mappin", done:true, body:`
    <div class="field-row">
      <div class="field"><label>المنطقة</label><select><option>منطقة الرياض</option></select></div>
      <div class="field"><label>المدينة</label><select><option>الرياض</option></select></div>
      <div class="field"><label>الحي</label><select><option>النخيل</option></select></div>
      <div class="field"><label>تصنيف الأصل</label><select><option>مباني</option></select></div>
    </div>`},
  {label:"البيانات الأساسية", icon:"database", badge:"9/14", body:`
    <div class="field-row">
      <div class="field"><label>رقم الصك</label><input value="4102938"/></div>
      <div class="field"><label>اسم المالك</label><input value="أحمد العتيبي"/></div>
      <div class="field"><label>مصدر الصك</label><input placeholder="لم يتم الإدخال"/></div>
      <div class="field"><label>رقم القطعة</label><input value="18"/></div>
    </div>`},
  {label:"الحدود", icon:"compass", badge:"8/8", body:`
    <div class="field-row">
      <div class="field"><label>الحد الشمالي</label><input value="شارع 40م"/></div>
      <div class="field"><label>الطول الشمالي</label><input value="25"/></div>
      <div class="field"><label>الحد الجنوبي</label><input value="جار"/></div>
      <div class="field"><label>الطول الجنوبي</label><input value="25"/></div>
    </div>`},
  {label:"التشطيب والخدمات", icon:"layers", body:`
    <div class="field-row">
      <div class="field"><label>حالة المبنى</label><select><option>مستعمل</option></select></div>
      <div class="field"><label>مستوى التشطيب</label><select><option>تشطيب لوكس</option></select></div>
      <div class="field"><label>الكهرباء</label><select><option>متوفرة</option></select></div>
      <div class="field"><label>الصرف الصحي</label><select><option>متوفر</option></select></div>
    </div>`},
  {label:"موقع الخارطة", icon:"map", body:`
    <button class="map-btn">${icon('map')}اختيار من الخارطة</button>
    <p class="coord">24.7136, 46.6753</p>
    <div class="map-preview">${icon('mappinoff')}معاينة الخارطة</div>`},
  {label:"المقارنة", icon:"scale", body:`
    <p style="color:var(--muted); font-size:13px; margin:0 0 10px;">تمت إضافة 3 عقارات مماثلة</p>
    <div class="compare-row"><span>فيلا، حي النخيل</span><span class="price">2,450 ريال/م²</span></div>
    <div class="compare-row"><span>فيلا، حي الياسمين</span><span class="price">2,610 ريال/م²</span></div>
    <div class="compare-row"><span>فيلا، حي الملقا</span><span class="price">2,530 ريال/م²</span></div>`},
  {label:"تكلفة الإحلال", icon:"tool", body:`
    <div class="field-row">
      <div class="field"><label>صافي تكلفة البناء</label><input value="980,000"/></div>
      <div class="field"><label>صافي سعر الأرض</label><input value="1,240,000"/></div>
    </div>
    <p class="hint">${icon('infocircle')}محتسبة تلقائيًا من بنود الإحلال</p>`},
  {label:"التحليل الاستثماري", icon:"chartbar", body:`
    <p style="color:var(--muted); font-size:13px; margin:0 0 12px;">يشمل الرسملة، القيمة المتبقية، التدفقات النقدية المخصومة والقيمة الإيجارية</p>
    <div class="stat-box"><p class="stat-label">صافي الدخل التشغيلي</p><p class="stat-value">142,500 ريال</p></div>`},
  {label:"طرق التقييم", icon:"reportmoney", body:`
    <div class="method-tabs">
      <span class="method-tab on">المقارنة</span>
      <span class="method-tab">تكلفة الإحلال</span>
      <span class="method-tab">الاستثمار</span>
    </div>
    <p style="color:var(--muted); font-size:13px;">سعر المتر المرجح: <b style="color:var(--ink);">2,480 ريال/م²</b></p>`},
  {label:"رأي المقيم", icon:"usercheck", body:`
    <div class="field-row">
      <div class="field"><label>تاريخ المعاينة</label><input value="2026-06-14"/></div>
      <div class="field"><label>القيمة النهائية للأصل</label><input value="2,180,000 ريال"/></div>
    </div>
    <div class="field" style="margin-top:14px;"><label>وصف ورأي المقيم</label><textarea placeholder="أضف ملاحظات التقييم هنا" style="min-height:80px;"></textarea></div>`},
  {label:"التقرير والمعدّون", icon:"scroll", body:`
    <div class="field" style="margin-bottom:14px;"><label>معايير التقييم المطبّقة</label><textarea placeholder="أشر إلى المعايير المعمول بها" style="min-height:64px;"></textarea></div>
    <div class="field-row">
      <div class="field"><label>المعد 1 — الاسم</label><input value="فهد القحطاني"/></div>
      <div class="field"><label>المعد 1 — المسمى الوظيفي</label><input value="مقيّم معتمد"/></div>
    </div>`}
];

let active = 0;

function renderRail(){
  const rail = document.getElementById('rail');
  rail.innerHTML = steps.map((s,i)=>{
    const isActive = i===active;
    const isDone = s.done || i<active;
    const iconClass = isDone ? 'done' : (isActive ? 'active' : 'todo');
    const inner = isDone ? icon('check') : icon(s.icon);
    return `<button class="rail-btn ${isActive?'active':''}" data-i="${i}">
      <span class="rail-icon ${iconClass}">${inner}</span>
      <span class="rail-label">${s.label}</span>
      ${s.badge && !isDone ? `<span class="rail-badge">${s.badge}</span>` : ''}
    </button>`;
  }).join('');
  rail.querySelectorAll('.rail-btn').forEach(b=>b.addEventListener('click', ()=>{ active=+b.dataset.i; render(); }));
}

function render(){
  renderRail();

  document.getElementById('content').innerHTML = `
    <p class="step-eyebrow">${icon(steps[active].icon)}الخطوة ${active+1} من ${steps.length}</p>
    <h3>${steps[active].label}</h3>
    ${steps[active].body}
    <div class="content-spacer"></div>
  `;

  document.getElementById('progress-pill').textContent = `الخطوة ${active+1} من ${steps.length}`;
  document.getElementById('progress-fill').style.width = `${((active+1)/steps.length)*100}%`;
  document.getElementById('nav-mid').textContent = `${active+1} / ${steps.length}`;

  const prev = document.getElementById('prevBtn');
  const next = document.getElementById('nextBtn');
  prev.disabled = active===0;
  next.disabled = active===steps.length-1;
  prev.innerHTML = `${icon('arrowright')}السابق`;
  next.innerHTML = active===steps.length-1
    ? `إرسال للمراجعة${icon('check')}`
    : `التالي${icon('arrowleft')}`;
}

document.getElementById('prevBtn').addEventListener('click', ()=>{ if(active>0){active--; render();} });
document.getElementById('nextBtn').addEventListener('click', ()=>{ if(active<steps.length-1){active++; render();} });

render();
</script>
</body>
</html>
